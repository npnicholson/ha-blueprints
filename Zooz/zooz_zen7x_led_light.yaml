blueprint:
  name: "Zooz ZEN7x LED Indicator as Light"
  description: >
    Exposes the LED indicator on a Zooz ZEN71, ZEN72, ZEN75, or ZEN77 switch
    as a standard Home Assistant `light` entity with color and brightness
    support. Designed for automation-driven signaling.

    Supports 4 colors: white, blue, green, red.

    State is read directly from the Z-Wave JS config parameter entities that
    HA creates automatically for the device — no helper entities required.

    To find the parameter entities, go to the device page in HA and look for
    number or select entities named something like "LED indicator color" and
    "LED indicator brightness".

    **One-time device setup** (run once per physical device, persists in device
    flash): Disable LED flash on setting changes so automations don't cause
    flicker. ZEN71/ZEN75: set parameter 19 to 1. ZEN72/ZEN77: confirm the
    correct parameter number for your firmware version in the Zooz docs.

  domain: template
  source_url: https://github.com/npnicholson/ha-blueprints/blob/main/blueprints/template/zooz_zen7x_led_light.yaml

  input:
    device_id:
      name: Zooz Switch/Dimmer Device
      description: The Zooz ZEN71, ZEN72, ZEN75, or ZEN77 device.
      selector:
        device:
          integration: zwave_js

    model:
      name: Switch Model
      selector:
        select:
          options:
            - label: "ZEN71 (On/Off Switch)"
              value: "zen71"
            - label: "ZEN72 (Dimmer)"
              value: "zen72"
            - label: "ZEN75 (Heavy Duty Switch)"
              value: "zen75"
            - label: "ZEN77 (S2 Dimmer)"
              value: "zen77"

    entity_name:
      name: Light Entity Name
      description: >
        Friendly name for the created light entity.
        e.g. "Hallway Switch LED"
      selector:
        text:

    mode_entity:
      name: LED Mode Entity
      description: >
        The Z-Wave JS number/select entity for the LED mode parameter.
        Controls on/off behavior. Find it on the device page — it will be
        named something like "LED indicator mode" or "LED indicator".
      selector:
        entity:
          integration: zwave_js

    color_entity:
      name: LED Color Entity
      description: >
        The Z-Wave JS number/select entity for the LED color parameter.
        Find it on the device page — named something like "LED indicator color".
      selector:
        entity:
          integration: zwave_js

    brightness_entity:
      name: LED Brightness Entity
      description: >
        The Z-Wave JS number/select entity for the LED brightness parameter.
        Find it on the device page — named something like "LED indicator
        brightness".
      selector:
        entity:
          integration: zwave_js

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  _device_id: !input device_id
  _model: !input model
  _mode_entity: !input mode_entity
  _color_entity: !input color_entity
  _brightness_entity: !input brightness_entity

  _params:
    zen71: {mode: "2", color: "14", brightness: "15"}
    zen72: {mode: "2", color: "23", brightness: "24"}
    zen75: {mode: "2", color: "14", brightness: "15"}
    zen77: {mode: "2", color: "23", brightness: "24"}

  # 4-color palette only — ZEN7x devices do not support magenta/yellow/cyan
  _palette:
    white: {r: 255, g: 255, b: 255, value: 0, hs: [0, 0]}
    blue:  {r: 0,   g: 0,   b: 255, value: 1, hs: [240, 100]}
    green: {r: 0,   g: 255, b: 0,   value: 2, hs: [120, 100]}
    red:   {r: 255, g: 0,   b: 0,   value: 3, hs: [0, 100]}

  # Reverse map: device color integer → hs_color for state reporting
  _color_to_hs:
    0: [0, 0]
    1: [240, 100]
    2: [120, 100]
    3: [0, 100]

  # Reverse map: device brightness integer → HA brightness (0-255)
  _brightness_to_ha:
    0: 255
    1: 153
    2: 77

# ---------------------------------------------------------------------------
# Light entity
# ---------------------------------------------------------------------------
light:
  name: !input entity_name

  supported_color_modes:
    - "hs"
  color_mode: "hs"

  # Read on/off state from the mode parameter entity.
  # Values 0 and 1 are behavior-tracking modes (on when relay on/off).
  # Value 2 = always off, value 3 = always on.
  # We treat 2 as off, everything else as on.
  state: "{{ states(_mode_entity) | int(2) != 2 }}"

  # Read color from the color parameter entity
  hs_color: >
    {% set cv = states(_color_entity) | int(0) %}
    {{ _color_to_hs.get(cv, [0, 0]) }}

  # Read brightness from the brightness parameter entity
  brightness: >
    {% set bv = states(_brightness_entity) | int(1) %}
    {{ _brightness_to_ha.get(bv, 153) }}

  turn_on:
    - variables:
        mode_param:       "{{ _params[_model]['mode'] }}"
        color_param:      "{{ _params[_model]['color'] }}"
        brightness_param: "{{ _params[_model]['brightness'] }}"

        in_r: "{{ (rgb_color[0] | int) if rgb_color is defined else 255 }}"
        in_g: "{{ (rgb_color[1] | int) if rgb_color is defined else 255 }}"
        in_b: "{{ (rgb_color[2] | int) if rgb_color is defined else 255 }}"

        # Find nearest supported palette color by Euclidean distance in RGB space
        nearest_color: >
          {% set ns = namespace(best_name='white', best_dist=999999) %}
          {% for name, c in _palette.items() %}
            {% set dist = ((in_r - c.r)**2 + (in_g - c.g)**2 + (in_b - c.b)**2) ** 0.5 %}
            {% if dist < ns.best_dist %}
              {% set ns.best_dist = dist %}
              {% set ns.best_name = name %}
            {% endif %}
          {% endfor %}
          {{ ns.best_name }}

        color_value: "{{ _palette[nearest_color]['value'] }}"

        # Map HA brightness 0–255 → Zooz 0=100%, 1=60%, 2=30%
        in_brightness: >
          {{ (brightness | int) if brightness is defined else 153 }}

        zooz_brightness: >
          {% if in_brightness > 170 %}0
          {% elif in_brightness > 85 %}1
          {% else %}2{% endif %}

    - action: zwave_js.set_config_parameter
      data:
        device_id: "{{ _device_id }}"
        parameter: "{{ mode_param }}"
        value: "3"

    - action: zwave_js.set_config_parameter
      data:
        device_id: "{{ _device_id }}"
        parameter: "{{ color_param }}"
        value: "{{ color_value }}"

    - action: zwave_js.set_config_parameter
      data:
        device_id: "{{ _device_id }}"
        parameter: "{{ brightness_param }}"
        value: "{{ zooz_brightness }}"

  turn_off:
    - variables:
        mode_param: "{{ _params[_model]['mode'] }}"

    - action: zwave_js.set_config_parameter
      data:
        device_id: "{{ _device_id }}"
        parameter: "{{ mode_param }}"
        value: "2"
